{% extends "quiz/base.html" %}
{% load static %}
{% block body %}

<script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
<script src="{% static 'assets/logic.js' %}"></script>
<script src="{% static 'assets/test.js' %}"></script>

<div class="quiz-stage">
  {% for q in Questions %}
  <div id="{{forloop.counter}}active" class="quiz-card" data-tries="0">

    <div class="sentences quiz-question" id="qpara" data-answer="{{q.answer_text}}">
      <p>{{ q.question_text }}</p>
    </div>

    <div class="timer-row">
      <div id="divCountdownBar" class="timer-track">
        <div id="divTimeLeft" class="timer-fill"></div>
      </div>
      <div id="TimeLeft" class="timer-num">0</div>
    </div>

    <textarea id="comment" class="TextInput answer-input" placeholder="Type your answer here..."></textarea>

    <div id="{{forloop.counter}}activecorrect" class="feedback-card" style="display:none;">
      <h2 id="{{forloop.counter}}CorrectOrNot" class="fb-verdict">Correct!</h2>
      <h2 class="fb-answer">Answer:&nbsp;{{q.display_answer}}</h2>
      <hr/>
      <p class="fb-exp">Explanation:<br>{{q.explanation_text}}</p>
    </div>

    <div class="quiz-nav">
      <button class="previous round" id="buttoon2" style="display:none;">&#8249;</button>
      <button class="next round" id="buttoon" data-attr="{{Numberrr}}" style="display:none;">&#8250;</button>
    </div>

  </div>
  {% endfor %}
</div>
{% endblock %}
