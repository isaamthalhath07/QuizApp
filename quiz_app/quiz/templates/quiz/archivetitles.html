{% extends "quiz/base.html" %}
{% load static %}
<script src="{% static 'assets/logic.js' %}"></script>
{% block cat %}



{% for title in titles %}

   <div style="width:2400px; display: flex;

  align-items: center;
  height: 100px;
  width: 100%;height:300px;border: solid 1px grey; border-radius:20px;margin-bottom:50px;box-shadow: 0px 3px 18px 3px rgba(0, 0, 0, 0.7);">
        <a href="{{title.title}}/" class="neonText"><h3>{{title.title.upper}}</h3></a>
         {% if title.is_Video %}
        <svg viewBox="0 0 24 24" width="100" height="100" fill="none" stroke="#ff5918" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="margin-left:200px;" aria-label="Video">
          <rect x="2.5" y="5" width="19" height="14" rx="3"></rect>
          <path d="M10 9.2v5.6l4.5-2.8z" fill="#ff5918"></path>
        </svg>
    {% endif %}
    {% if title.is_Audio %}
        <svg viewBox="0 0 24 24" width="100" height="100" fill="none" stroke="#ff5918" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="margin-left:200px;" aria-label="Audio">
          <path d="M9 17V6l9-2v11"></path>
          <circle cx="6.5" cy="17" r="2.5" fill="#ff5918" stroke="none"></circle>
          <circle cx="15.5" cy="15" r="2.5" fill="#ff5918" stroke="none"></circle>
        </svg>
    {% endif %}
    {% if title.is_Image %}
        <svg viewBox="0 0 24 24" width="100" height="100" fill="none" stroke="#ff5918" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="margin-left:200px;" aria-label="Image">
          <rect x="3" y="4.5" width="18" height="15" rx="3"></rect>
          <circle cx="8.5" cy="9.5" r="1.8" fill="#ff5918" stroke="none"></circle>
          <path d="M21 16l-5-5-8 8.5"></path>
        </svg>
    {% endif %}
   </div>

{%endfor%}









</div>
{% endblock %}
