{% extends "quiz/base.html" %}
{% load static %}
{% block catw %}

<h3 class="cat-title">Choose your sub category</h3>

<div class="cat-bento">
  <a class="maincat" href="questions/{{ maincat }}"><img src="{% static 'assets/All.png' %}" alt=""><h3>ALL</h3></a>
  {% for item in subcats %}
  <a class="maincat" href="questions/{{ item }}"><img src="{% static 'assets/' %}{{ item }}.png" alt=""><h3>{{ item.upper }}</h3></a>
  {% endfor %}
</div>

{% endblock %}
