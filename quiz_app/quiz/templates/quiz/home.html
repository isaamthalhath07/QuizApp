{% load static %}

<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizite</title>
    <link rel="stylesheet" href="{% static 'assets/main.css' %}">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Quicksand:400,500,700&subset=latin-ext" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.2.1.js"></script>
    <script src="{% static 'assets/logic.js' %}"></script>
</head>
<body>

<div class="wrapper">
  <nav style="z-index:3;">
    <div class="logo"><img src="{% static 'assets/logo.png' %}" width="175.5" height="45"></div>
    <ul id="navbar">
      <li><a href="/quiz/" class="selected navelement firstelement" style="font-family:'Montserrat';">Home</a></li>
      <li><a href="/quiz/about/" class="navelement" style="font-family:'Montserrat';">About</a></li>
      <li><a href="/quiz/archive/" class="lastelement navelement" style="font-family:'Montserrat';">Archive</a></li>
      <li>
        <form action="/quiz/logout/" method="post" style="display:inline;">
          {% csrf_token %}
          <button type="submit" class="active navelement" style="font-family:'Montserrat';background:none;border:none;cursor:pointer;color:inherit;font-size:inherit;padding:0;">Logout</button>
        </form>
      </li>
      <img src="{% static 'assets/DefaultAvatar.png' %}" style="width:48px;height:48px;border-radius:50%;margin-left:30px;border:4px solid #FF8052;z-index:1;">
      <li><a style="margin-left:-4px;background:none;border:none;" href="#">{{userboi}}</a></li>
    </ul>
  </nav>
</div>

<div class="bento">

  <div class="bento-fact">
    <div class="fact-label"><img src="{% static 'assets/Facts.png' %}" style="width:26px;height:26px;border-radius:50%;"> Random fact</div>
    <div class="fact-body">{{ Facts }}</div>
  </div>

  <h2 class="bento-quiz-title">Take a quiz</h2>

  <a href="/quiz/mcq/categories" class="bento-tile"><img class="bento-icon" src="{% static 'assets/MCQ.png' %}" alt=""><span class="bento-label">MCQ</span></a>
  <a href="/quiz/written/categories" class="bento-tile"><img class="bento-icon" src="{% static 'assets/Written.png' %}" alt=""><span class="bento-label">Written</span></a>
  <a href="/quiz/flashcard/categories" class="bento-tile"><img class="bento-icon" src="{% static 'assets/Flashcards.png' %}" alt=""><span class="bento-label">Flashcards</span></a>
  <a href="/quiz/connect/categories" class="bento-tile wide"><img class="bento-icon" src="{% static 'assets/Connect.png' %}" alt=""><span class="bento-label">Connect</span></a>
  <a href="/quiz/audiovisual/categories/" class="bento-tile wide"><img class="bento-icon" src="{% static 'assets/AV.png' %}" alt=""><span class="bento-label">Audiovisual</span></a>

</div>

</body>
</html>
